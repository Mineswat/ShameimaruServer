

services:

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    ports:
      - ${PORT:-7575}:${PORT:-7575}
    environment:
      - SECRET_ENCRYPTION_KEY=98a523a191e5387b8055cd3359db40eac626377bed2cc71ef509318da9557838 #ts should be autogenerated but idk how so yolo

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - homarr_vol:/appdata

    deploy:
      resources:
        limits:

            memory: ${HARDMEMORY:-512M}
            #hard memory limit

            cpus: ${CPU:-1}
            #cpu usage limit


volumes:
  homarr_vol:
---
services:
  qbittorrent:
    image: linuxserver/qbittorrent:5.2.2-libtorrentv1
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
      - TORRENTING_PORT=${TORRENT_PORT:-6887}
    volumes:
      - tconfig:/config
      - Q-OMV:/Downloads #optional
    ports:
      - 8080:8080
      - ${TORRENT_PORT:-6887}:${TORRENT_PORT:-6887}
      - ${TORRENT_PORT:-6887}:${TORRENT_PORT:-6887}/udp
    stop_grace_period: "10s" #optional
    restart: unless-stopped

volumes:
 tconfig:
 Q-OMV:

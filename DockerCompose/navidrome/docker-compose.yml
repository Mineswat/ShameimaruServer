name: navidrome

services:

  navidrome:
    image: deluan/navidrome:latest
    container_name: navi
    restart: unless-stopped
    ports:
      - "${PORT:-4533}:${PORT:-4533}"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - ND_SCANINTERVAL=1m
      - ND_LOGLEVEL=info
      - ND_PORT=4533
      - ND_TRANSCODINGCACHESIZE=100MB
      - ND_SESSIONTIMEOUT=24h
      - ND_DEFAULTDOWNLOADABLESHARE=true
      - ND_ENABLEINSIGHTSCOLLECTOR=false

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4533"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    volumes:
      #- navi_vol:/data
     # - omv-navi:/music:ro
      - omv-navi:/music:ro
      - omv-navi-DB:/data

      #- ./music:/music:ro
    #Resource limits cpu/memory
    deploy:
      resources:
        limits:
            memory: 512M
            cpus: "1.0"



volumes:
  omv-navi:
    driver_opts:
      type: cifs
      o: 'iocharset=utf8,username=Mineswat,password=Komaru1!,rw' # change to `ro` if read only desired
      device: "//192.168.0.88/Root/Media/Media/Music"

  omv-navi-DB:

#make another volume